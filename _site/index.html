    <script>
        // Update copyright year
        document.addEventListener('DOMContentLoaded', function() {
            var footerYear = document.querySelector('.footer p');
            if (footerYear) {
                footerYear.innerHTML = footerYear.innerHTML.replace(/\d{4}/, new Date().getFullYear());
            }
        });
        
        // Particle animation
        document.addEventListener('DOMContentLoaded', function() {
            var canvas = document.getElementById('particles');
            var ctx = canvas.getContext('2d');
            var particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resizeCanvas();
            window.addEventListener('resize', function() {
                resizeCanvas();
                particles = [];
                createParticles();
            });

            function Particle() {
                this.reset = function(initializing) {
                    // If initializing, spread across whole canvas, otherwise start from left
                    this.x = initializing ? Math.random() * canvas.width : -10;
                    this.y = Math.random() * canvas.height;
                    
                    // Create depth layers with weighted distribution
                    var rand = Math.random();
                    if (rand < 0.75) { // 75% chance for far layer
                        this.z = Math.random() * 1; // 0-1
                        this.size = 0.3 + Math.random() * 0.3; // More consistent small size
                        this.opacity = 0.3 + Math.random() * 0.2; // More visible
                        this.speedX = 0.1 + (Math.random() * 0.2);
                    } else if (rand < 0.88) { // 13% chance for middle layer
                        this.z = 1 + (Math.random() * 0.8); // 1-1.8
                        this.size = 0.6 + Math.random() * 0.4;
                        this.opacity = 0.4 + Math.random() * 0.2;
                        this.speedX = 0.2 + (Math.random() * 0.3);
                    } else if (rand < 0.97) { // 9% chance for larger particles
                        this.z = 1.5 + (Math.random() * 0.5); // 1.5-2
                        this.size = 1.2 + Math.random() * 0.8; // Larger size
                        this.opacity = 0.3 + Math.random() * 0.3;
                        this.speedX = 0.25 + (Math.random() * 0.35);
                    } else { // 3% chance for largest layer
                        this.z = 1.8 + (Math.random() * 0.2); // 1.8-2
                        this.size = 1.6 + Math.random() * 1;
                        this.opacity = 0.4 + Math.random() * 0.3;
                        this.speedX = 0.3 + (Math.random() * 0.4);
                    }
                    
                    this.speedY = (Math.random() - 0.5) * (0.1 + (this.z * 0.05)); // Vertical movement based on depth
                };

                this.respawn = function() {
                    this.reset(false); // false indicates respawn from left
                };

                this.update = function() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > canvas.width) {
                        this.respawn();
                    }

                    if (this.y < 0) {
                        this.y = 0;
                        this.speedY = Math.abs(this.speedY) * 0.5;
                    } else if (this.y > canvas.height) {
                        this.y = canvas.height;
                        this.speedY = -Math.abs(this.speedY) * 0.5;
                    }
                };

                this.draw = function() {
                    var gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 2
                    );
                    gradient.addColorStop(0, 'rgba(255, 255, 255, ' + this.opacity + ')');
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(255, 255, 255, ' + (this.opacity * 1.5) + ')';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                };

                this.reset();
            }

            function createParticles() {
                var numberOfParticles = Math.floor((canvas.width * canvas.height) / 4000); // Increased particle density
                for (var i = 0; i < numberOfParticles; i++) {
                    var p = new Particle();
                    p.reset(true); // true indicates initial creation
                    particles.push(p);
                }
            }

            function drawConnections() {
                for (var i = 0; i < particles.length; i++) {
                    var connections = 0; // Count connections per particle
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var distance = Math.sqrt(dx * dx + dy * dy);
                        
                        // More connections with closer distance threshold
                        if (distance < 120 && Math.abs(particles[i].z - particles[j].z) < 1.2) {
                            var opacity = 0.2 * (1 - distance/120); // Increased base opacity
                            
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(255, 255, 255, ' + opacity + ')';
                            ctx.lineWidth = 0.3; // Thicker lines
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                            
                            connections++;
                            if (connections >= 3) break; // Limit connections per particle
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Update and draw particles
                for (var i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                
                // Draw connections between particles
                drawConnections();
                
                requestAnimationFrame(animate);
            }

            createParticles();
            animate();
        });
    </script>
    </script>
